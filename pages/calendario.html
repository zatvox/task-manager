<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario · ZV Task Manager</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png" />
  <link rel="manifest" href="../site.webmanifest" />
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <style>
    .calendar-toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:var(--space-3); margin-bottom:var(--space-5); }
    .calendar-nav { display:flex; align-items:center; gap:var(--space-3); }
    .calendar-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap:1px; background:var(--border-subtle); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); overflow:hidden; }
    .calendar-grid .dow { background:var(--bg-surface-raised); padding:var(--space-2); text-align:center; font-size:var(--fs-xs); font-weight:700; color:var(--text-secondary); text-transform:uppercase; }
    .calendar-day { background:var(--bg-surface); min-height:108px; padding:var(--space-2); display:flex; flex-direction:column; gap:4px; }
    .calendar-day.otro-mes { opacity:0.35; }
    .calendar-day.hoy { background: var(--color-accent-soft); }
    .calendar-day.drag-over { outline:2px dashed var(--color-accent); }
    .calendar-day__num { font-size:var(--fs-xs); color:var(--text-tertiary); font-weight:700; }
    .evento-chip { font-size:11px; padding:2px 6px; border-radius:4px; background:var(--bg-surface-raised); border-left:3px solid var(--color-accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
    .evento-chip.vencida { color: var(--color-danger); border-left-color: var(--color-danger); }
    .semana-grid { display:grid; grid-template-columns: repeat(7, minmax(160px,1fr)); gap:var(--space-2); overflow-x:auto; }
    .dia-columna { background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:var(--space-3); min-height:300px; }
    .hora-fila { display:grid; grid-template-columns: 64px 1fr; border-bottom:1px solid var(--border-subtle); min-height:48px; }
    .hora-label { font-size:var(--fs-xs); color:var(--text-tertiary); padding:var(--space-2); }
  </style>
</head>
<body>
  <div class="app-shell" id="app-shell"><div id="layout-root"></div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="../assets/js/calendario.js"></script>
</body>
</html>
