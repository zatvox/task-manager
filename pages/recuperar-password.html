<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña · ZV Task Manager</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png" />
  <link rel="manifest" href="../site.webmanifest" />
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-page__visual" aria-hidden="true">
      <img src="../assets/images/logo.png" alt="" />
      <h1>Recupera tu acceso</h1>
      <p>Te enviaremos un enlace seguro a tu correo para restablecer tu contraseña.</p>
    </section>
    <section class="auth-page__form-area">
      <div class="auth-card">
        <div class="auth-card__logo">
          <img src="../assets/images/logo.png" alt="ZV Task Manager" />
          <h2>Recuperar contraseña</h2>
        </div>
        <form id="form-recuperar" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico</label>
            <input class="form-control" type="email" id="email" name="email" required placeholder="tu@empresa.com" />
            <p class="form-error">Ingresa un correo válido.</p>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Enviar enlace</button>
          <p style="text-align:center; margin-top: var(--space-4); font-size: var(--fs-sm);">
            <a href="login.html">← Volver a iniciar sesión</a>
          </p>
        </form>
      </div>
    </section>
  </main>
  <script type="module" src="../assets/js/recuperar-password.js"></script>
</body>
</html>
