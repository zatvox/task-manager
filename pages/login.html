<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · ZV Task Manager</title>
  <meta name="description" content="Inicia sesión en ZV Task Manager, el sistema de gestión de tareas multiempresa." />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png" />
  <link rel="manifest" href="../site.webmanifest" />
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido</a>
  <main id="main" class="auth-page">
    <section class="auth-page__visual" aria-hidden="true">
      <img src="../assets/images/logo.png" alt="" />
      <h1>ZV Task Manager</h1>
      <p>Gestiona tareas, proyectos y equipos de múltiples empresas desde un solo lugar.</p>
    </section>
    <section class="auth-page__form-area">
      <div class="auth-card">
        <div class="auth-card__logo">
          <img src="../assets/images/logo.png" alt="ZV Task Manager" />
          <h2>Bienvenido de nuevo</h2>
        </div>
        <form id="form-login" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico</label>
            <input class="form-control" type="email" id="email" name="email" required autocomplete="email" placeholder="tu@empresa.com" />
            <p class="form-error">Ingresa un correo válido.</p>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input class="form-control" type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" minlength="6" />
            <p class="form-error">La contraseña debe tener al menos 6 caracteres.</p>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-login">
            <span class="btn-text">Iniciar sesión</span>
          </button>
          <p style="text-align:center; margin-top: var(--space-4); font-size: var(--fs-sm);">
            <a href="recuperar-password.html">¿Olvidaste tu contraseña?</a>
          </p>
          <p style="text-align:center; margin-top: var(--space-2); font-size: var(--fs-sm); color: var(--text-secondary);">
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
          </p>
        </form>
      </div>
    </section>
  </main>
  <script type="module" src="../assets/js/login.js"></script>
</body>
</html>
